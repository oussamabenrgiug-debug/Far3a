<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>متجر سومة 🛒</h1>
  <input type="text" id="search-bar" placeholder="ابحث عن هاتف...">
  <div id="products-grid">جاري الاتصال...</div>

  <script>
    // 2. استخدام الدالة الجاهزة للمكتبة بعد التأكد من تحميلها
    async function initStore() {
      const grid = document.getElementById('products-grid');
      const searchBar = document.getElementById('search-bar');
      
      // التأكد أن supabase معرفة
      if (typeof supabase === 'undefined') {
        grid.innerHTML = "خطأ: لم يتم تحميل مكتبة Supabase.";
        return;
      }

      // 3. إنشاء العميل بمتغير جديد تماماً
      const client = supabase.createClient(
        'https://meaowbpwyliwajcqzmed.supabase.co', 
        'sb_publishable_3pUDOGLuidmrvR7edS8JVw_q7JFsDwT'
      );

      try {
        const { data, error } = await client.from('phones').select('*');
        if (error) throw error;

        let allProducts = data || [];

        function render(list) {
          grid.innerHTML = list.length > 0 ? list.map(p => `
            <div style="border:1px solid #ddd; margin:10px; padding:15px; border-radius:10px;">
              <h3>${p.title || 'بدون اسم'}</h3>
              <p>السعر: ${p.price_usd ? p.price_usd + ' $' : 'غير متوفر'}</p>
            </div>
          `).join('') : "لا توجد نتائج.";
        }

        searchBar.oninput = (e) => {
          const filtered = allProducts.filter(p => 
            p.title?.toLowerCase().includes(e.target.value.toLowerCase())
          );
          render(filtered);
        };

        render(allProducts);
      } catch (err) {
        grid.innerHTML = "حدث خطأ: " + err.message;
      }
    }

    // تشغيل الدالة فور تحميل الصفحة
    initStore();
  </script>
</body>
</html>
