<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متجر سومة - Far'a</title>
  <style>
    body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
    header { background: #2c3e50; color: white; padding: 1rem; text-align: center; }
    nav { background: #34495e; padding: 0.5rem; text-align: center; }
    nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
    .container { padding: 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
  </style>
</head>
<body>

  <header>
    <h1>مرحباً بك في متجر سومة</h1>
  </header>

  <nav>
    <a href="#">الرئيسية</a>
    <a href="#">المنتجات</a>
    <a href="#">تواصل معنا</a>
  </nav>

  <div class="container">
    <h2>أحدث المنتجات</h2>
    <div class="product-grid">
      <div class="product-card">
        <h3>هاتف ذكي</h3>
        <p>أحدث الإصدارات</p>
      </div>
      <div class="product-card">
        <h3>سيارة مستعملة</h3>
        <p>حالة ممتازة</p>
      </div>
    </div>
  </div>

</body>
</html>
