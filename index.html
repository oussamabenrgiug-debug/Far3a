
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* فرض التنسيق الداكن إجبارياً */
    body { background-color: #0f172a !important; color: white !important; font-family: sans-serif; margin: 0; }
    header { background: #1e293b !important; padding: 20px; text-align: center; }
    .card { background: #334155 !important; margin: 15px; padding: 20px; border-radius: 15px; color: white !important; }
    #search-bar { width: 90%; padding: 10px; margin: 10px auto; display: block; border-radius: 10px; }
  </style>
</head>
<body>
  <header><h1>متجر سومة 🛒</h1></header>
  <input type="text" id="search-bar" placeholder="ابحث...">
  <div id="products-grid"></div>

  <script>
    window.addEventListener('load', async () => {
      const client = supabase.createClient('https://meaowbpwyliwajcqzmed.supabase.co', 'sb_publishable_3pUDOGLuidmrvR7edS8JVw_q7JFsDwT');
      const { data } = await client.from('phones').select('*');
      const grid = document.getElementById('products-grid');
      
      grid.innerHTML = data.map(p => `
        <div class="card">
          <h3>${p.title}</h3>
          <p>السعر: ${p.price_usd} $</p>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
