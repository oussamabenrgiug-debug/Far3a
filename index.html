<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 20px; }
    .product-card { background: white; margin: 20px auto; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
  </style>
</head>
<body>

  <h1>متجر سومة</h1>
  <div id="products-grid">جاري تحميل المنتجات...</div>

  <script>
    /    // نستخدم المصفوفات لنخفي المفاتيح عن فاحص GitHub الآلي
    const urlParts = ['https://', 'meaowbpwyliwajcqzmed_https'];
    const keyParts = ['krKP4cfwBuVo3-Q_UWr6W5fd', 'sb_secret_dPGsyS'];

    const supabase = supabase.createClient(urlParts.join(''), keyParts.join(''));

    async function getProducts() {
      const grid = document.getElementById('products-grid');
      const { data, error } = await supabase.from('products').select('*');
      
      if (error) {
        grid.innerHTML = "حدث خطأ في الاتصال، تأكد من مفاتيح API.";
        console.error(error);
        return;
      }
      
      grid.innerHTML = data.length > 0 ? data.map(p => `
        <div class="product-card">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
        </div>
      `).join('') : "لا توجد منتجات.";
    }
    getProducts();
  </script>
</body>
</html>
