<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 20px; }
    .product-card { background: white; margin: 20px auto; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
  </style>
</head>
<body>

  <h1>متجر سومة</h1>
  <div id="products-grid">جاري تحميل المنتجات...</div>

  <script>
    // هذه المتغيرات سيتم تعويضها بواسطة Netlify تلقائياً
    const SUPABASE_URL = process.env.SUPABASE_URL;
    const SUPABASE_KEY = process.env.SUPABASE_KEY;

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function getProducts() {
      const { data, error } = await supabase.from('products').select('*');
      const grid = document.getElementById('products-grid');
      
      if (error) {
        grid.innerHTML = "حدث خطأ في الاتصال، يرجى التأكد من إعدادات الموقع.";
        return;
      }
      grid.innerHTML = data.map(p => `
        <div class="product-card">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
        </div>
      `).join('');
    }
    getProducts();
  </script>
</body>
</html>
