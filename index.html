<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>متجر سومة 🛒</h1>
  <div id="products-grid">جاري تحميل المنتجات...</div>

  <script>
    // انتظار تحميل المكتبة وصفحة الويب بالكامل
    window.addEventListener('load', async () => {
      const grid = document.getElementById('products-grid');
      
      try {
        // التحقق من أن المكتبة تم تحميلها
        if (typeof supabase === 'undefined') {
          throw new Error("لم يتم تحميل مكتبة Supabase");
        }

        const url = 'https://meaowbpwyliwajcqzmed.supabase.co';
        const key = 'sb_publishable_3pUDOGLuidmrvR7edS8JVw_q7JFsDwT';
        
        // إنشاء العميل باسم مختلف لتفادي التضارب
        const supabaseClient = supabase.createClient(url, key);
        
        // جلب البيانات
        const { data, error } = await supabaseClient.from('phones').select('*');
        
        if (error) throw error;
        
        if (data && data.length > 0) {
          grid.innerHTML = data.map(p => `
            <div style="border: 1px solid #ddd; padding: 10px; margin: 10px; border-radius: 8px;">
              <h3>${p.title || 'بدون اسم'}</h3>
              <p>السعر: ${p.price_usd ? p.price_usd + ' $' : 'غير متوفر'}</p>
            </div>
          `).join('');
        } else {
          grid.innerHTML = "لا توجد منتجات.";
        }
      } catch (err) {
        grid.innerHTML = "حدث خطأ: " + err.message;
      }
    });
  </script>
</body>
</html>
