<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>متجر سومة</h1>
  <div id="products-grid">جاري التحميل...</div>

  <script>
    // التأكد من تحميل المكتبة أولاً
    window.addEventListener('load', async () => {
      const grid = document.getElementById('products-grid');
      
      try {
        const url = 'https://meaowbpwyliwajcqzmed.supabase.co';
        const key = 'sb_publishable_3pUDOGLuidmrvR7edS8JVw_q7JFsDwT';
        
        // إنشاء العميل
        const supabaseClient = supabase.createClient(url, key);
        
        const { data, error } = await supabaseClient.from('cars').select('*');
        
        if (error) {
          grid.innerHTML = "خطأ في الاتصال: " + error.message;
          return;
        }
        
        if (data && data.length > 0) {
          grid.innerHTML = data.map(p => `
            <div>
              <h3>${p.name || 'بدون اسم'}</h3>
              <p>${p.description || 'لا يوجد وصف'}</p>
            </div>
          `).join('');
        } else {
          grid.innerHTML = "لا توجد منتجات.";
        }
      } catch (err) {
        grid.innerHTML = "حدث خطأ غير متوقع: " + err.message;
      }
    });
  </script>
</body>
</html>
