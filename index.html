<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; }
    .card { background: #1e293b; margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
    .price { color: #38bdf8; font-weight: bold; }
    .desc { color: #94a3b8; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>متجر سومة 🛒</h1>
  <div id="products-grid">جاري التحميل...</div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://meaowbpwyliwajcqzmed.supabase.co', 
      'sb_publishable_3pUDOGLuidmrvR7edS8JVw_q7JFsDwT'
    );

    async function loadPhones() {
      const { data, error } = await supabaseClient.from('phones').select('*');
      const grid = document.getElementById('products-grid');
      
      if (error) {
        grid.innerHTML = "خطأ: " + error.message;
        return;
      }
      
      grid.innerHTML = data.map(p => `
        <div class="card">
          <h3>${p.title}</h3>
          <p class="price">السعر: ${p.price_usd} $</p>
          <p class="desc">${p.description || ''}</p>
        </div>
      `).join('');
    }

    loadPhones();
  </script>
</body>
</html>
