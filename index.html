<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>متجر سومة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 20px; }
    .product-card { background: white; margin: 20px auto; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
  </style>
</head>
<body>

  <h1>متجر سومة</h1>
  <div id="products-grid">جاري تحميل المنتجات...</div>

  <script>
    /      const urlParts = ['https://', 'meaowbpwyliwajcqzmed.supabase.co'];
    const keyParts = ['sb_publishable_3pUDOGLuidmrvR7edS8JVw_q7JFsDwT'];

    const supabase = supabase.createClient(urlParts.join(''), keyParts.join(''));

    async function getProducts() {
      const grid = document.getElementById('products-grid');
      
      const { data, error } = await supabase.from('cars').select('*');
      
      if (error) {
        alert("خطأ في الاتصال: " + error.message);
        grid.innerHTML = "حدث خطأ أثناء تحميل البيانات.";
        return;
      }
      
      if (data && data.length > 0) {
        grid.innerHTML = data.map(p => `
          <div class="product-card">
            <h3>${p.name}</h3>
            <p>${p.description}</p>
          </div>
        `).join('');
      } else {
        grid.innerHTML = "لا توجد منتجات في قاعدة البيانات حالياً.";
      }
    }
    
    getProducts();
  </script>
</body>
</html>
